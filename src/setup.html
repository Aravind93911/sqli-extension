<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="setup.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ Tech Bazzar Setup</h1>
            <p>Configure your SQL Injection Detection</p>
        </div>

        <form id="setupForm" class="form">
            <!-- API Key Section -->
            <div class="form-section">
                <h3>API Configuration</h3>
                <p class="description">
                    Enter your API key to enable real-time threat detection and logging.
                    Get your API key from <a href="https://dashboard.techbazzar.com" target="_blank">techbazzar.com</a>
                </p>

                <div class="form-group">
                    <label for="apiKey">API Key</label>
                    <input 
                        type="password" 
                        id="apiKey" 
                        placeholder="sk_live_xxxxxxxxxxxx"
                        class="form-input"
                    >
                    <small>Your API key will be encrypted locally</small>
                </div>

                <button type="button" id="testApiBtn" class="btn btn-test">Test Connection</button>
                <div id="testResult" style="display: none; margin-top: 10px;"></div>
            </div>

            <!-- Settings Section -->
            <div class="form-section">
                <h3>Security Settings</h3>

                <label class="checkbox">
                    <input type="checkbox" id="blockAttacksToggle" checked>
                    <span>Block malicious requests</span>
                </label>

                <label class="checkbox">
                    <input type="checkbox" id="enableNotificationsToggle" checked>
                    <span>Show notifications</span>
                </label>

                <div class="form-group">
                    <label for="notificationLevel">Notification Level</label>
                    <select id="notificationLevel" class="form-input">
                        <option value="low">Low (only critical threats)</option>
                        <option value="medium" selected>Medium (all threats)</option>
                        <option value="high">High (detailed alerts)</option>
                    </select>
                </div>
            </div>

            <!-- Data Management -->
            <div class="form-section">
                <h3>Data Management</h3>

                <button type="button" id="clearLogsBtn" class="btn btn-danger">
                    Clear All Threat Logs
                </button>

                <button type="button" id="exportLogsBtn" class="btn btn-secondary">
                    Export Logs (CSV)
                </button>
            </div>

            <!-- Save Button -->
            <button type="submit" class="btn btn-primary btn-save">
                Save Settings
            </button>
        </form>

        <div id="message" style="display: none; margin-top: 20px; padding: 12px; border-radius: 6px; text-align: center;"></div>
    </div>

    <script src="setup.js"></script>
</body>
</html>
