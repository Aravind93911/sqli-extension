<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">🛡️</div>
            <h1>Tech Bazzar</h1>
            <p class="subtitle">SQL Injection Detector</p>
        </div>

        <!-- Status Card -->
        <div class="status-card" id="statusCard">
            <div class="status-icon">✓</div>
            <div class="status-content">
                <h3>All Clear</h3>
                <p>No threats on this page</p>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-number" id="todayThreats">0</div>
                <div class="stat-label">Threats Today</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="blockedCount">0</div>
                <div class="stat-label">Blocked</div>
            </div>
        </div>

        <!-- Threats List -->
        <div class="threats-section" id="threatsList" style="display: none;">
            <h4>Recent Threats</h4>
            <div class="threats-container" id="threatsContainer"></div>
        </div>

        <!-- Action Buttons -->
        <div class="buttons">
            <button class="btn btn-primary" id="openDashboard">
                <span>📊</span> Dashboard
            </button>
            <button class="btn btn-secondary" id="openSetup">
                <span>⚙️</span> Setup
            </button>
        </div>

        <!-- Settings -->
        <div class="settings-panel">
            <label class="checkbox-item">
                <input type="checkbox" id="blockAttacks" checked>
                <span>Block malicious requests</span>
            </label>
            <label class="checkbox-item">
                <input type="checkbox" id="enableNotifications" checked>
                <span>Show notifications</span>
            </label>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="#">Settings</a> | 
            <a href="#">Help</a> | 
            <a href="#">Report</a>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
